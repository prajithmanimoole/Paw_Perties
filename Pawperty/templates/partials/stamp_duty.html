<div class="stamp-duty-card">
  <h3 class="stamp-duty-title">Transaction Cost Preview</h3>
  <table class="stamp-duty-table">
    <tr>
      <td>Transfer Value</td>
      <td class="text-right">₹{{ "{:,.0f}".format(value) }}</td>
    </tr>
    <tr>
      <td>Stamp Duty <span class="rate-label">({{ rate_label }})</span></td>
      <td class="text-right">₹{{ "{:,.0f}".format(duty) }}</td>
    </tr>
    <tr>
      <td>Registration Fee <span class="rate-label">(5%)</span></td>
      <td class="text-right">₹{{ "{:,.0f}".format(reg_fee) }}</td>
    </tr>
    <tr class="total-row">
      <td><strong>Total Payable</strong></td>
      <td class="text-right">
        <strong>₹{{ "{:,.0f}".format(total) }}</strong>
      </td>
    </tr>
  </table>
</div>
