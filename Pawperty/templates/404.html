{% extends "base.html" %}
{% block title %}404 Not Found &mdash; Pawperty{% endblock %}
{% block content %}
<div class="error-page">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>

</div>
{% endblock %}
