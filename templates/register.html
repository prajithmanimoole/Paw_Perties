{% extends "base.html" %}
{% block title %}Register Property &mdash; Pawperty{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Register New Property</h1>
</div>

<div class="form-page" x-data="{ loading: false }">
  <form action="/register" method="post" class="property-form" @submit="loading = true">
    <!-- Section 1: Identity -->
    <div class="form-section">
      <h2 class="form-section-title">Owner Identity</h2>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="property_key">Property Key <span class="required">*</span></label>
          <input id="property_key" name="property_key" type="text" class="form-input"
                 value="{{ form_data.property_key | default('') }}" placeholder="e.g. PROP-00001" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="owner_name">Owner Name <span class="required">*</span></label>
          <input id="owner_name" name="owner_name" type="text" class="form-input"
                 value="{{ form_data.owner_name | default('') }}" placeholder="Full legal name" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="aadhar_no">Aadhar Number <span class="required">*</span></label>
          <input id="aadhar_no" name="aadhar_no" type="text" class="form-input"
                 value="{{ form_data.aadhar_no | default('') }}" placeholder="12-digit Aadhar number" maxlength="12"
                 hx-post="/htmx/validate-aadhar" hx-trigger="blur" hx-target="#aadhar-feedback"
                 hx-include="[name='owner_name']" required />
          <div id="aadhar-feedback" class="field-feedback"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="pan_no">PAN Number <span class="required">*</span></label>
          <input id="pan_no" name="pan_no" type="text" class="form-input"
                 value="{{ form_data.pan_no | default('') }}" placeholder="e.g. ABCDE1234F" maxlength="10"
                 hx-post="/htmx/validate-pan" hx-trigger="blur" hx-target="#pan-feedback"
                 hx-include="[name='owner_name']" required />
          <div id="pan-feedback" class="field-feedback"></div>
        </div>
      </div>
    </div>

    <!-- Section 2: Property -->
    <div class="form-section">
      <h2 class="form-section-title">Property Details</h2>
      <div class="form-grid">
        <div class="form-group form-col-2">
          <label class="form-label" for="address">Address <span class="required">*</span></label>
          <input id="address" name="address" type="text" class="form-input"
                 value="{{ form_data.address | default('') }}" placeholder="Full property address" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="pincode">Pincode <span class="required">*</span></label>
          <input id="pincode" name="pincode" type="text" class="form-input"
                 value="{{ form_data.pincode | default('') }}" placeholder="6-digit pincode" maxlength="6" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="value">Property Value (₹) <span class="required">*</span></label>
          <input id="value" name="value" type="number" step="1" min="1" class="form-input"
                 value="{{ form_data.value | default('') }}" placeholder="e.g. 5000000" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="survey_no">Survey Number <span class="required">*</span></label>
          <input id="survey_no" name="survey_no" type="text" class="form-input"
                 value="{{ form_data.survey_no | default('') }}" placeholder="Survey/Map number"
                 hx-post="/htmx/validate-survey" hx-trigger="blur" hx-target="#survey-feedback" required />
          <div id="survey-feedback" class="field-feedback"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="rtc_no">RTC Number</label>
          <input id="rtc_no" name="rtc_no" type="text" class="form-input"
                 value="{{ form_data.rtc_no | default('') }}" placeholder="Record of Rights number" />
        </div>
      </div>
    </div>

    <!-- Section 3: Location (collapsible) -->
    <div class="form-section" x-data="{ open: false }">
      <button type="button" class="form-section-toggle" @click="open = !open">
        <h2 class="form-section-title">Location Details</h2>
        <span x-text="open ? '▲' : '▼'"></span>
      </button>
      <div x-show="open" x-transition>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="village">Village</label>
            <input id="village" name="village" type="text" class="form-input"
                   value="{{ form_data.village | default('') }}" />
          </div>
          <div class="form-group">
            <label class="form-label" for="taluk">Taluk / Tehsil</label>
            <input id="taluk" name="taluk" type="text" class="form-input"
                   value="{{ form_data.taluk | default('') }}" />
          </div>
          <div class="form-group">
            <label class="form-label" for="district">District</label>
            <input id="district" name="district" type="text" class="form-input"
                   value="{{ form_data.district | default('') }}" />
          </div>
          <div class="form-group">
            <label class="form-label" for="state">State</label>
            <input id="state" name="state" type="text" class="form-input"
                   value="{{ form_data.state | default('') }}" />
          </div>
        </div>
      </div>
    </div>

    <!-- Section 4: Land Details (collapsible) -->
    <div class="form-section" x-data="{ open: false }">
      <button type="button" class="form-section-toggle" @click="open = !open">
        <h2 class="form-section-title">Land Details</h2>
        <span x-text="open ? '▲' : '▼'"></span>
      </button>
      <div x-show="open" x-transition>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="land_area">Land Area</label>
            <input id="land_area" name="land_area" type="text" class="form-input"
                   value="{{ form_data.land_area | default('') }}" placeholder="e.g. 2400 sq ft, 5 acres" />
          </div>
          <div class="form-group">
            <label class="form-label" for="land_type">Land Type</label>
            <select id="land_type" name="land_type" class="form-input form-select">
              <option value="">— Select —</option>
              <option value="residential" {{ 'selected' if form_data.land_type == 'residential' }}>Residential</option>
              <option value="commercial" {{ 'selected' if form_data.land_type == 'commercial' }}>Commercial</option>
              <option value="agricultural" {{ 'selected' if form_data.land_type == 'agricultural' }}>Agricultural</option>
              <option value="industrial" {{ 'selected' if form_data.land_type == 'industrial' }}>Industrial</option>
            </select>
          </div>
          <div class="form-group form-col-2">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="form-input form-textarea"
                      placeholder="Optional notes about the property">{{ form_data.description | default('') }}</textarea>
          </div>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <div class="form-actions">
      <a href="/properties" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary" :disabled="loading"
              x-text="loading ? 'Registering…' : 'Register Property'"></button>
    </div>
  </form>
</div>
{% endblock %}
