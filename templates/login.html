{% from "partials/icons.html" import chain, eye, eyeOff %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login &mdash; Pawperty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="stylesheet" href="/static/css/forms.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
  </head>
  <body class="login-body">
    <div class="login-container" x-data="{ tab: '{{ active_tab | default('staff') }}' }">
      <div class="login-card">
        <div class="login-brand">
          <span class="brand-icon-large">{{ chain(48) }}</span>
          <h1 class="login-title">Pawperty</h1>
          <p class="login-subtitle">Property Ledger Blockchain</p>
        </div>

        <!-- Tab switcher -->
        <div class="login-tabs">
          <button
            class="login-tab"
            :class="{ 'login-tab-active': tab === 'staff' }"
            @click="tab = 'staff'"
            type="button"
          >Staff Login</button>
          <button
            class="login-tab"
            :class="{ 'login-tab-active': tab === 'citizen' }"
            @click="tab = 'citizen'"
            type="button"
          >Citizen Login</button>
        </div>

        {% if flash %}
        <div
          class="flash flash-{{ flash.category }}"
          x-data="{ show: true }"
          x-show="show"
        >
          <span>{{ flash.message }}</span>
          <button @click="show = false" class="flash-close">&times;</button>
        </div>
        {% endif %}

        <!-- Staff login form -->
        <div x-show="tab === 'staff'" {% if active_tab != 'staff' %}style="display:none"{% endif %}>
          <form
            action="/login"
            method="post"
            x-data="{ loading: false }"
            @submit="loading = true"
          >
            <div class="form-group">
              <label for="username" class="form-label">Username</label>
              <input
                id="username"
                name="username"
                type="text"
                class="form-input"
                placeholder="Enter your username"
                autocomplete="username"
                required
              />
            </div>

            <div class="form-group">
              <label for="staff-password" class="form-label">Password</label>
              <div class="input-wrapper" x-data="{ show: false }">
                <input
                  id="staff-password"
                  name="password"
                  :type="show ? 'text' : 'password'"
                  class="form-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="input-toggle"
                  @click="show = !show"
                  tabindex="-1"
                >
                  <span x-show="!show">{{ eye(20) }}</span>
                  <span x-show="show" x-cloak>{{ eyeOff(20) }}</span>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-full"
              :disabled="loading"
              x-text="loading ? 'Signing in…' : 'Sign In'"
            ></button>
          </form>
        </div>

        <!-- Citizen login form -->
        <div x-show="tab === 'citizen'" {% if active_tab != 'citizen' %}style="display:none"{% endif %}>
          <form
            action="/citizen/login"
            method="post"
            x-data="{ loading: false }"
            @submit="loading = true"
          >
            <div class="form-group">
              <label for="customer_key" class="form-label">Customer ID</label>
              <input
                id="customer_key"
                name="customer_key"
                type="text"
                class="form-input"
                placeholder="e.g. CUST-A1B2C3D4"
                autocomplete="off"
                style="text-transform: uppercase;"
                required
              />
            </div>

            <div class="form-group">
              <label for="citizen-password" class="form-label">Password</label>
              <div class="input-wrapper" x-data="{ show: false }">
                <input
                  id="citizen-password"
                  name="password"
                  :type="show ? 'text' : 'password'"
                  class="form-input"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button
                  type="button"
                  class="input-toggle"
                  @click="show = !show"
                  tabindex="-1"
                >
                  <span x-show="!show">{{ eye(20) }}</span>
                  <span x-show="show" x-cloak>{{ eyeOff(20) }}</span>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="btn btn-primary btn-full"
              :disabled="loading"
              x-text="loading ? 'Signing in…' : 'Sign In as Citizen'"
            ></button>
          </form>

          <div class="login-register-link">
            <p>Don't have an account?
              <a href="/citizen/register">Register as Citizen →</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
