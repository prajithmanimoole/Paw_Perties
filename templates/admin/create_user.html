{% extends "base.html" %}
{% from "partials/icons.html" import eye, eyeOff %}
{% block title %}Create User &mdash; Pawperty{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Create New User</h1>
  <span class="role-badge role-admin">Admin Only</span>
</div>

<div class="form-page form-page-narrow" x-data="{ loading: false }">
  <form action="/admin/users/create" method="post" class="property-form" @submit="loading = true">
    <div class="form-section">
      <div class="form-grid">
        <div class="form-group form-col-2">
          <label class="form-label" for="username">Username <span class="required">*</span></label>
          <input id="username" name="username" type="text" class="form-input"
                 value="{{ form_data.username | default('') }}" placeholder="Unique login name"
                 autocomplete="off" required autofocus />
        </div>

        <div class="form-group form-col-2">
          <label class="form-label" for="password">Password <span class="required">*</span></label>
          <div class="input-wrapper" x-data="{ show: false }">
            <input id="password" name="password" :type="show ? 'text' : 'password'" class="form-input"
                   placeholder="Minimum 8 characters recommended" autocomplete="new-password" required />
            <button type="button" class="input-toggle" @click="show = !show" tabindex="-1">
              <span x-show="!show">{{ eye(20) }}</span>
              <span x-show="show" x-cloak>{{ eyeOff(20) }}</span>
            </button>
          </div>
        </div>

        <div class="form-group form-col-2">
          <label class="form-label" for="role">Role <span class="required">*</span></label>
          <select id="role" name="role" class="form-input form-select" required>
            <option value="officer" {{ 'selected' if form_data.role != 'admin' }}>Officer — property operations only</option>
            <option value="admin" {{ 'selected' if form_data.role == 'admin' }}>Admin — full system access</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a href="/admin/users" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-primary" :disabled="loading"
              x-text="loading ? 'Creating…' : 'Create User'"></button>
    </div>
  </form>
</div>
{% endblock %}
